name: Pre-commit checks

on:
  workflow_call:
    outputs:
      md_only:
        description: Whether the pull request changes only Markdown files
        value: ${{ jobs.check-file-sizes.outputs.md_only }}

permissions:
  contents: read
  packages: read

jobs:
  check-file-sizes:
    runs-on: ubuntu-24.04
    outputs:
      md_only: ${{ steps.detect.outputs.md_only }}
    steps:
      - name: Detect markdown-only pull request
        id: detect
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "md_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          files="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" --jq '.[].filename')"
          if [ -z "$files" ]; then
            echo "md_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          md_only=true
          while IFS= read -r file; do
            case "${file,,}" in
              *.md) ;;
              *)
                md_only=false
                break
                ;;
            esac
          done <<< "$files"

          echo "md_only=$md_only" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
      - name: Check file sizes (max 1 MB)
        uses: freenet-actions/check-file-size@v1.1.5
        with:
          max_size: 1024
          post_comment: false
          fail_on_find: true

  pre-commit:
    needs: check-file-sizes
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/learning-process/ppc-ubuntu:1.1
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Setup environment
        run: |
          python3 -m pip install -r requirements.txt --break-system-packages --ignore-installed
      - name: Configure git safe directory
        run: |
          git config --global --add safe.directory '*'
      - name: Run pre-commit checks
        run: |
          FROM_REF="${{ github.base_ref || 'HEAD~1' }}"
          git fetch origin $FROM_REF:$FROM_REF || true
          pre-commit run --from-ref $FROM_REF --to-ref HEAD
